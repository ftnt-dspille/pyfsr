name: Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'src/pyfsr/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        description: 'The Git ref to checkout'
  # Manual deploy: refresh the public site for a docs-only change without
  # cutting a release (which would also ship a new PyPI version). The title
  # will carry the current ``X.Y.Z+devN`` dev suffix until the next release.
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    # The build is read-only; the gh-pages deploy (release only) pushes a branch.
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Sphinx >=9.1 (the pinned docs-gate version) requires Python >=3.12.
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          # `[playbooks]` so the playbook-authoring doctests (compile_yaml →
          # CompiledPlaybook shape) can run under `make doctest`.
          python -m pip install ".[docs,playbooks]"

      - name: Verify package installation
        run: |
          python -c "import pyfsr; print(pyfsr.__file__)"
          python -c "from pyfsr.api import alerts; print(alerts.__file__)"

      - name: Setup Doc Directory
        run: |
          mkdir -p docs/build/html
          mkdir -p docs/source/_autosummary
          mkdir -p docs/source/_static
          mkdir -p docs/source/_templates
          touch docs/source/_static/.gitkeep
          touch docs/source/_templates/.gitkeep

      - name: Build documentation
        run: |
          cd docs
          make clean
          PYTHONPATH=$PYTHONPATH:${{ github.workspace }}/src make html SPHINXOPTS="-W --keep-going -n"

      - name: Run doctests
        # Executes the explicit doctest directives in the guides so documented
        # examples can't silently rot (illustrative `>>>` snippets are excluded
        # via doctest_test_doctest_blocks="" in conf.py).
        run: |
          cd docs
          PYTHONPATH=$PYTHONPATH:${{ github.workspace }}/src make doctest

      - name: Validate doc code examples
        # Checks that pyfsr symbols and CLI flags named in *plain* fenced code
        # blocks (which `make doctest` skips) still resolve against the installed
        # package/CLI -- catches drift after a namespace regroup or flag rename.
        run: |
          cd docs
          PYTHONPATH=$PYTHONPATH:${{ github.workspace }}/src make check-examples

      - name: Check build output
        run: |
          if [ ! -f docs/build/html/index.html ]; then
            echo "Documentation build failed - index.html not found"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        # Deploy on release so the public site always reflects the published
        # version (hatch-vcs derives a clean ``X.Y.Z`` only at the tagged commit).
        # A plain main push builds for verification but does not deploy — that
        # would re-publish a ``X.Y.Z+1.devN`` title between releases. A manual
        # workflow_dispatch deploys on demand for docs-only fixes.
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          force_orphan: true
          commit_message: 'docs: update documentation [skip ci]'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
