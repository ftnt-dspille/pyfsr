name: Tests

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/pyfsr/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/**'
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        description: 'The Git ref to checkout'
  # Weekly run on main so unpinned (`>=`) runtime/docs deps that break the build
  # surface on a schedule, not at release time. Mondays 07:00 UTC.
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

# Cancel superseded runs for the same PR/branch to save CI minutes; never cancel
# scheduled or release (workflow_call) runs.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: check
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: format --check
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: mypy (typed CLI surface)
        run: |
          pip install -e '.[typecheck]'
          mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # hatch-vcs derives the version from tags — need full history + tags.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          pip install -e '.[test]' tomli
          # The playbooks extra (fsr_playbooks) floor was lowered to Python
          # >=3.10. Until that release is on PyPI the pin may still resolve to a
          # 3.12-only build on older Pythons, so install best-effort — authoring
          # tests run where the extra installs and skip elsewhere.
          pip install '.[playbooks]' || echo "playbooks extra unavailable on this Python; authoring tests will skip"

      - name: Run tests
        run: |
          pytest tests/ --cov=pyfsr --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  docs:
    needs: test
    permissions:
      contents: write
    uses: ./.github/workflows/docs.yml
    with:
      # Fall back to the triggering ref for schedule / workflow_dispatch /
      # workflow_call runs, which have no pull_request context.
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit
