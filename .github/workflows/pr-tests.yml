name: Tests

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/pyfsr/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/**'
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        description: 'The Git ref to checkout'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: check
      - uses: astral-sh/ruff-action@v1
        with:
          args: format --check
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: mypy (typed CLI surface)
        run: |
          pip install -e '.[typecheck]'
          mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the version from tags — need full history + tags.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          pip install -e '.[test]' tomli
          # The playbooks extra (fsr_playbooks) floor was lowered to Python
          # >=3.10. Until that release is on PyPI the pin may still resolve to a
          # 3.12-only build on older Pythons, so install best-effort — authoring
          # tests run where the extra installs and skip elsewhere.
          pip install '.[playbooks]' || echo "playbooks extra unavailable on this Python; authoring tests will skip"

      - name: Run tests
        run: |
          pytest tests/ --cov=pyfsr --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  docs:
    needs: test
    uses: ./.github/workflows/docs.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit
