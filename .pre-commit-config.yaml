# Catch CI failures locally before they reach GitHub.
#
# One-time setup (installs BOTH the commit-time and push-time hooks):
#   pre-commit install
#   pre-commit install -t pre-push
#
# Then: lint/format run on every commit; the heavier tests + strict docs build
# run on every push. Run everything manually with `pre-commit run -a`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  # Lint + format with the EXACT ruff pinned in this project (run via uv), so
  # local results match CI. Using the ruff-pre-commit mirror instead would pin a
  # second, independent ruff version that can drift from the lockfile and pass
  # locally while CI's `ruff format --check` fails (which is what bit us).
  #
  # `--frozen` is required, not optional: pyfsr uses hatch-vcs dynamic
  # versioning, so a bare `uv run` is free to re-resolve and rebuild the
  # editable package on each call. That both defeats the pin (we observed two
  # different ruff versions from back-to-back `uv run` calls) and can race two
  # hooks against uv.lock, leaving a half-written lock that fails to parse
  # ("missing field version"). `--frozen` uses the lock as-is and never mutates
  # it, giving deterministic, CI-matching runs.
  - repo: local
    hooks:
      # Leak gate (runs first, before any lint/format): refuse to commit if a
      # private/lab IP or a non-placeholder credential value is staged anywhere.
      # always_run + pass_filenames: false so every commit scans the whole
      # tracked tree -- a partial commit can't sneak a leak through by not
      # staging the offending file.
      - id: no-leaks
        name: no leaked IPs / credentials
        entry: uv run --frozen python scripts/check_no_leaks.py
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-check
        name: ruff check (project pin, via uv)
        entry: uv run --frozen ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format (project pin, via uv)
        entry: uv run --frozen ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: mypy-cli
        name: mypy (typed CLI surface)
        # Scoped to src/pyfsr/cli via [tool.mypy] files=. pass_filenames=false so
        # the whole configured set is checked (not just changed files), matching
        # CI. --extra typecheck pulls mypy from the frozen lock.
        entry: uv run --frozen --extra typecheck mypy
        language: system
        pass_filenames: false
        files: '^src/pyfsr/cli/'

      # --- pre-push only: mirror the CI jobs that are slow but high-signal ---
      - id: pytest-unit
        name: pytest unit suite (mirrors CI test jobs)
        entry: uv run --frozen pytest tests/unit -q -p no:cacheprovider
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: docs-build
        name: sphinx docs build -W -n (mirrors CI docs job; catches broken cross-refs)
        # SPHINX_OFFLINE=1 skips external intersphinx inventory fetches so VPN/proxy
        # SSL inspection doesn't turn network errors into -W build failures.
        # CI runs without this var and validates cross-refs against real inventories.
        entry: bash -c 'cd docs && SPHINX_OFFLINE=1 PYTHONPATH=../src uv run --frozen make html SPHINXOPTS="-W --keep-going -n"'
        language: system
        pass_filenames: false
        stages: [pre-push]
