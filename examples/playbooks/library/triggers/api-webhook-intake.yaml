  - type: set_variable
    name: Process Entire Alert Description
    vars:
      process: '{{vars.alert_description.append({ ''Alert Description'':vars.cybr_alert_description }) }}

        {{vars.alert_description.append({ ''Alert Message'':vars.cybr_alert_message }) }}

        {{vars.alert_description.append({ ''Alert Intent'':vars.cybr_alert_intent }) }}

        {{vars.alert_description.append({ ''Alert Solution'':vars.cybr_alert_solution }) }}

        {{vars.alert_description.append({ ''Alert Source System'':vars.cybr_alert_source_system }) }}

        {{vars.alert_description.append({ ''Alert Indicator'':vars.cybr_alert_indicator }) }}

        {{vars.alert_description.append({ ''Alert Root Cause Analysis'':vars.cybr_alert_root_cause }) }}

        {{vars.alert_description.append({ ''Alert Assigned Analyst'':vars.cybr_alert_assigned_analyst }) }}

        {{vars.alert_description.append({ ''Agent IP'':vars.cybr_alert_agent_ip }) }}

        {{vars.alert_description.append({ ''Agent Full OS'':vars.cybr_alert_agent_os_full }) }}

        {{vars.alert_description.append({ ''Agent_name'':vars.cybr_alert_agent_name }) }}'
    next: create_new_cybr_hawk_alert
  - type: set_variable
    name: Severity Calculation
    vars:
      cyber_alert_severity_calc: "{% if vars.cybr_alert_severity|string in vars.sev_critical %}\n  {{\"Severity\" | picklist(\"Critical\", \"@id\") }}\n{% elif vars.cybr_alert_severity|string in vars.sev_high %}\n  {{\"Severity\" | picklist(\"High\", \"@id\") }}\n{% elif vars.cybr_alert_severity|string in vars.sev_medium %}\n  {{\"Severity\" | picklist(\"Medium\", \"@id\") }}\n{% else %}\n  {{\"Severity\" | picklist(\"Low\", \"@id\") }}\n{% endif %}"
    next: alert_secondary_fields
  - type: set_variable
    name: Source Data Setting AND Controlling
    vars:
      control1: '{{vars.individual_alert._id | length }}'
      control2: '{{vars.individual_alert._source.td.alert | length }}'
      cybr_source_data2: '{{vars.individual_alert | toJSON }}'
    next: is_json_correct
  - type: api_endpoint
    name: Start
    step_variables:
      input:
        params:
          api_body: '{{vars.request.data}}'
          api_params: '{{vars.request.params}}'
          Alert_Individual_data: '{{ vars.Alert_Individual_data }}'
    arguments:
      route: deferred/pcs
      __triggerLimit: true
      triggerOnSource: true
      triggerOnReplicate: false
      authentication_methods:
      - anonymous
    next: playbook_authentication_keys
  annotations:
  - id: add_alert_detail
    title: Add Alert Detail
    body: 'IGNORE ERROR = Yes

      (the playbook will not stop with Red  flag)'
    position:
      top: 400
      left: 1660
      width: 300
  - id: alert_main_fields
    kind: block
    title: Alert Main Fields
    contains:
    - alert_severity_mapping
    - basic_fields_for_all_alert_types
    - severity_calculation
    position:
      top: 180
      left: 420
      height: 461
      width: 329
  - id: attention
    title: Attention
    body: This is the first version of Cybr Hawk Alert integration. Much things would be done in the future, like processigng "Windows" information from the alerts, presenting Geo information for the correlated assets, etc
    position:
      top: 720
      left: 1560
      height: 142
      width: 498
  - id: attention_2
    title: Attention
    body: This Step (Alert Creation) is the most important in this Playbook
    position:
