# Library playbook: Threat-feed ingestion: parse a domain-threat JSON alert, map severity/tags, create an enriched alert.
#
# source: tutorial-corpus: FortiRecon BP Domain Threats Ingestion
# cleaned: no_trigger:None, delete_mistype:1, branches:0, api_body_param:True
#
# goal: Threat-feed ingestion: parse a domain-threat JSON alert, map severity/tags, create an enriched alert.
# trigger: (see the Start step below; original export's trigger re-typed)
# inputs:  vars.input.records[0] (inbound record) unless noted
# outputs: a comment / record update on the source record
# connectors: see connector steps (connector-pluggable; swap the config for your appliance)
# adapts-to: the SOC intent named above; retarget by changing the module + inputs.

collection: 00. Playbook Learning SP - Specific Playbooks
description: ''
visible: true
playbooks:
- name: FortiRecon BP Domain Threats Ingestion
  description: Process JSON alerts and create FSR alerts
  is_active: true
  trigger_step_id: start
  steps:
  - type: set_variable
    name: Controls and Tags
    vars:
      BPtags: '{{vars.myalert.tags}}'
      myarray: '[]'
      myarray2: '[''Xperts26'', ''NOC Automation'', ''FortiRecon'', ''Brand Protection'']'
      titlePrefix: '"Xperts26: "'
      artifactsAll: '{{vars.myalert | extract_artifacts}}'
      BPadded_tsLEN: '{{vars.myalert.added_ts | length }}'
      BPalert_idLEN: '{{vars.myalert.id | length }}'
      myalertSourceData: '{{vars.myalert  | toJSON }}'
    next: is_json_health
  - type: insert_record
    name: Create Comment
    ignore_errors: true
    step_variables: []
    arguments:
      resource:
        type: /api/3/picklists/ff599189-3eeb-4c86-acb0-a7915e85ac3b
        alerts: '{{vars.steps.Create_Recon_BP_Alert[''@id'']}}'
        people: []
        content: <p>Please, pay attention to the SLAs and to the SEVERITY of this alert.</p>
        __replace: ''
        isImportant: true
        peopleUpdated: false
      operation: Overwrite
      collection: /api/3/comments
      fieldOperation:
        recordTags: Overwrite
    next: end
  - type: insert_record
    name: Create Recon BP Alert
    ignore_errors: false
    step_variables: []
    arguments:
      resource:
        name: '{{vars.finalTitle}}'
        type: /api/3/picklists/0b3ef6f9-eb29-4ab9-ac98-98364bd1a3aa
        state: /api/3/picklists/a1bac09b-1441-45aa-ad1b-c88744e48e72
        domain: '{{vars.BPbadDomain}}'
        source: Webhook
        status: /api/3/picklists/7de816ff-7140-4ee5-bd05-93ce22002146
        severity: '{{vars.finalSeverity}}'
        sourceId: '{{vars.BPalert_id}}'
        ticketID: BPticket
        __replace: ''
        assignedTo: /api/3/people/3451141c-bac6-467c-8d72-85e0fab569ce
        recordTags: '{{vars.alertTagsArray}}'
        sourcedata: '{{vars.myalert | toJSON }}'
        description: "<div class=\"font-size-16 ng-binding padding-bottom-sm\">\n<h4 style=\"background: #404142;padding: 5px;text-align: left;color: orange;background:black;\">\n{{vars.finalTitle}} - {{vars.myalert.id }}\n</h4></div>\n\n<table style=\"border-color: #04080c;\" border=\"1\" class=\"font-normal\">\n<tbody>\n<tr>\n<td>\n\n<div class=\"font-size-14 ng-binding\">Alert Problematic Domain</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.BPbadDomain}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Original Domain</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.BPoriginalDomain}}</div>\n</div>\n\n\n<div class=\"font-size-14 ng-binding\">Alert Tags</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.tagString}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Alert Overall Status</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.BPstatus}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Alert Added Timestamp</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.BPadded_ts}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Alert Severity</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.BPseverity}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Alert Online Status</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.BPonline_status}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Is parked?</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{ vars.BPis_parked}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Is Impersonation?</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.BPis_impersonation}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Is False Positive?</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid red;background:#141b23\">{{vars.BP_is_false_positive}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Artifacts</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid green;background:#141b23\">{{vars.artifactsSpecificArray | join(', ')}}</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Status Description</div><div class=\"card-container-body\" style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid blue;background:#141b23\">\n\n{% if vars.BPonline_status == 'ONLINE' %}\n{{vars.onlineDescription}}\n{% elif vars.BPonline_status == 'OFFLINE' %}\n{{vars.offlineDescription}}\n{% elif vars.BPonline_status == 'NON_FUNCTIONAL' %}\n{{vars.nonFunctionalDescription}}\n{% elif vars.BPonline_status == 'TAKEDOWN' %}\n{{vars.takedownDescription}}\n{% else %}\n UNKOWN_STATUS\n{% endif %}\n\n</div>\n</div>\n\n<div class=\"font-size-14 ng-binding\">Tag Description</div><div class=\"card-container-body\"\
          \ style=\"width: 100%;font-size:46px;\">\n<div class=\"card-number\" style=\"font-size:20px;  border-left: 5px solid blue;background:#141b23\">\n\n{% for tag in vars.BPtags %}\n  {% if tag.name == 'Brand Impersonation' %}\n    {{vars.impersonationDescription}} <BR>\n  {% elif tag.name == 'Typosquatting' %}\n    {{vars.typoDescription}} <BR>\n  {% elif tag.name == 'MX Record' %}\n    {{vars.mxDescription}} <BR>\n  {% elif tag.name == 'Phishing' %}\n    {{vars.phishingDescription}} <BR>\n  {% elif tag.name == 'Parked Domain' %}\n    {{vars.parkedDescription}}<BR>\n  {% else %}\n    UNKOWN_TAG <BR>\n  {% endif %}\n{% endfor %}\n\n</div>\n</div>\n\n</td>\n</tr>\n</tbody>\n</table>"
        ackSlaStatus: /api/3/picklists/72979f64-e8b9-4888-a965-957e0ec24818
        mitreattackid: '{{vars.mitreTechnique}}'
        respSlaStatus: /api/3/picklists/72979f64-e8b9-4888-a965-957e0ec24818
        mitreTechnique: '{{vars.mitreTechnique}}'
        priorityWeight: 1
        escalatedtoincident: /api/3/picklists/2128a09c-153d-4db3-985d-de6be33deae5
        resolvedAutomatedly: false
        alertRemainingAckSLA: 0
      operation: Overwrite
      collection: /api/3/alerts
      fieldOperation:
        recordTags: Overwrite
    next: create_comment
  - type: set_variable
    name: Create Title and Arrays
    vars:
      finalTitle: '{{ vars.titlePrefix ~ vars.BPbadDomain ~ '' - '' ~ vars.tagString }}'
      finalSeverity: '{% if vars.BPseverity | lower == "critical" %}

        {{"Severity" | picklist("Critical", "@id")}}

        {% elif vars.BPseverity | lower == "high" %}

        {{"Severity" | picklist("High", "@id")}}

        {% elif vars.BPseverity | lower == "medium" %}

        {{"Severity" | picklist("Medium", "@id")}}

        {% else %}

        {{"Severity" | picklist("Low", "@id")}}

        {% endif %}'
      alertTagsArray: '{{vars.myarray2}}'
      artifactsSpecificArray: '{{vars.myarray}}'
    next: set_tag_and_status_descr
  - type: connector
    name: End
    pickFromTenant: false
    step_variables: []
    arguments:
      name: Utilities
      params: []
      connector: cyops_utilities
      operation: no_op
      operationTitle: 'Utils: No Operation'
  - type: set_variable
    name: Extract Main Alert Data
    vars:
      BPtags: '{{vars.myalert.tags}}'
      BPsource: '{{vars.myalert.source}}'
      BPstatus: '{{vars.myalert.status}}'
      BPticket: '{{vars.myalert.ticket_id}}'
      BPadded_ts: '{{vars.myalert.added_ts }}'
      BPalert_id: '{{vars.myalert.id }}'
      BPdns_data: '{{vars.myalert.dns_data}}'
      BPseverity: '{{vars.myalert.severity}}'
      BPbadDomain: '{{vars.myalert.domain}}'
      BPis_parked: '{{vars.myalert.is_parked}}'
      BPonline_status: '{{vars.myalert.online_status}}'
      BPoriginalDomain: '{{vars.myalert.original_domain}}'
      artifactsResults: '{{vars.artifactsAll.results}}'
      BPis_impersonation: '{{vars.myalert.is_impersonation}}'
      BP_is_false_positive: '{{vars.myalert.is_false_positive}}'
    next: get_ips_and_urls
  - type: set_variable
    name: Get IPs and URLs
    vars:
      myFor: '{% for item in vars.artifactsResults %}

        {% if item.type == ''URL'' or item.type == ''IP Address'' %}

        {{vars.myarray.append(item.value)}}

        {% endif %}

        {% endfor %}'
    next: manipulate_recon_bp_tags
  - type: set_variable
    name: Get JSON Alert
    vars:
      myalert: '{{vars.input.params[''api_body'']}}'
    next: controls_and_tags
  - type: decision
    name: Is JSON Health
    step_variables: []
    conditions:
    - display: Go Ahead
      when: '{{ vars.BPalert_idLEN > 10 and vars.BPalert_idLEN > 10 }}'
      next: extract_main_alert_data
    - display: Let´s finish
      default: true
      next: end
  - type: set_variable
    name: Manipulate Recon BP Tags
    vars:
      myFor2: '{% for item in vars.BPtags %}

        {{vars.myarray2.append(item.name)}}

        {% endfor %}'
      tagString: '{{ vars.BPtags | map(attribute=''name'') | join('' & '') }}'
    next: create_title_and_arrays
  - type: set_variable
    name: Mitre Tactics
    vars:
      mitreTactic: TA0001
      mitreTechnique: T1566
    next: create_recon_bp_alert
