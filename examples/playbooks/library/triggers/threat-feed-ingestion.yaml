  annotations:
  - id: bp_alert_creation
    kind: block
    title: BP Alert Creation
    body: Main Steps
    contains:
    - create_comment
    - create_recon_bp_alert
    - mitre_tactics
    - set_tag_and_status_descr
    position:
      top: 60
      left: 900
      height: 555
      width: 302
  - id: initial_steps
    kind: block
    title: Initial Steps
    body: Playbook Authentication and JSON Extraction
    contains:
    - controls_and_tags
    - get_json_alert
    - playbook_authentication
    position:
      top: 160
      left: 20
      height: 444
      width: 307
