  - type: set_variable
    name: Set Tag and Status Descr
    vars:
      mxDescription: '''An MX (Mail eXchanger) DNS record is a type of resource record in the Domain Name System (DNS) that specifies the mail servers responsible for receiving email on behalf of a domain. It tells sending servers where to route messages (via SMTP). Without correct MX records, emails will not reach their intended destination'''
      typoDescription: '''Typosquatting tag: a typosquatting domain alert is a cybersecurity warning about a malicious or suspicious domain name that mimics a legitimate one using small spelling mistakes or variations (e.g., goggle.com instead of google.com)'''
      onlineDescription: '''Online Status: this denotes that the website has an active web server'''
      parkedDescription: '''Parked tag: this denotes that the domain is not hosting any website. But rather is hosting webpage with advertisements'''
      offlineDescription: '''Offline Status: this denotes that the website does not have an IP address in the DNS A type records'''
      phishingDescription: '''Phishing tag: a phishing domain alert is a cybersecurity warning that a domain is being used (or likely to be used) to trick users into revealing sensitive information, such as passwords, credit card details, or credentials'''
      takedownDescription: '''A Takedown was requested for the problematic Domain. Go to the Original JSON to see the ticket_id'''
      impersonationDescription: '''Brand Impersonation tag: a brand impersonation domain alert is a cybersecurity warning that a domain is pretending to represent a legitimate company or brand (e.g., using the brand name in the domain to look official)'''
      nonFunctionalDescription: '''Non Functional Status: this denotes that the website, in spite of having an IP address in the DNS A type records, is not hosting a web server'''
    next: mitre_tactics
  - type: api_endpoint
    name: Start
    step_variables:
      input:
        params:
          api_body: '{{vars.request.data}}'
          api_params: '{{vars.request.params}}'
    arguments:
      route: deferred/xperts
      __triggerLimit: true
      triggerOnSource: true
