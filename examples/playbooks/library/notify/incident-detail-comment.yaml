# Library playbook: Add a comment to an incident with its first/last seen timestamps and incident count.
#
# source: tutorial-corpus: FortiSIEM: Bring COUNT information from Incidents
# cleaned: no_trigger:None, delete_mistype:1, branches:0
#
# goal: Add a comment to an incident with its first/last seen timestamps and incident count.
# trigger: (see the Start step below; original export's trigger re-typed)
# inputs:  vars.input.records[0] (inbound record) unless noted
# outputs: a comment / record update on the source record
# connectors: see connector steps (connector-pluggable; swap the config for your appliance)
# adapts-to: the SOC intent named above; retarget by changing the module + inputs.

collection: 00. Playbook Learning SP - Specific Playbooks
description: ''
visible: true
playbooks:
- name: 'FortiSIEM: Bring COUNT information from Incidents'
  description: FortiSIEM customizations
  is_active: true
  trigger_step_id: start
  steps:
  - type: insert_record
    name: Add Comment about the COUNT
    step_variables: []
    arguments:
      resource:
        type: /api/3/picklists/ff599189-3eeb-4c86-acb0-a7915e85ac3b
        alerts: '{{vars.input.records[0][''@id'']}}'
        people: []
        content: '<p>Incident <span style="color: rgb(241, 196, 15);">First Seen</span> is:<strong> <span style="color: rgb(185, 106, 217); font-size: 12pt;">{{arrow.get(vars.incidentFirstSeen).to("UTC").format("YYYY-MM-DD HH:mm:ss ZZ")}} UTC</span></strong></p>

          <p>Incident <span style="color: rgb(241, 196, 15);">Last Seen</span> is: <span style="color: rgb(185, 106, 217); font-size: 12pt;">{{arrow.get(vars.incidentLastSeen).to("UTC").format("YYYY-MM-DD HH:mm:ss ZZ")}} UTC</span></p>

          <p>Incident&nbsp;<span style="color: rgb(241, 196, 15);">count</span> is:<span style="color: rgb(45, 194, 107);"><strong> <span style="font-size: 24pt;">{{vars.incidentCount}}</span></strong></span></p>

          <p>&nbsp;</p>'
        __replace: ''
        isImportant: true
        peopleUpdated: false
      operation: Overwrite
      collection: /api/3/comments
      __recommend: []
      fieldOperation:
        recordTags: Overwrite
    next: end
  - type: connector
    name: Clear Manually an Incident with a Reason
    pickFromTenant: false
    step_variables: []
    arguments:
      name: Fortinet FortiSIEM
      config: c9ee8a67-9ce3-4578-97f7-e9d33ffaad8b
      params:
        incidentId: '{{vars.incidentId}}'
      connector: fortinet-fortisiem
      operation: get_incident_details
      operationTitle: Get Incident Details
    next: incident_output
  - type: set_variable
    name: Configuration
    vars:
      incidentId: '{{vars.input.records[0].sourceId}}'
    next: clear_manually_an_incident_with_a_reason
  - type: CyopsUtilites
    name: End
    step_variables: []
    arguments:
      params: []
      version: 3.5.0
      connector: cyops_utilities
      operation: no_op
      operationTitle: 'Utils: No Operation'
  - type: set_variable
    name: Incident Output
    vars:
      incidentCount: '{{vars.steps.Clear_Manually_an_Incident_with_a_Reason.data.data.0.count}}'
      incidentOutput: '{{vars.steps.Clear_Manually_an_Incident_with_a_Reason.data.data}}'
      incidentLastSeen: '{{vars.incidentOutput.0.incidentLastSeen}}'
      incidentFirstSeen: '{{vars.incidentOutput.0.incidentFirstSeen}}'
    next: add_comment_about_the_count
  - type: start_on_create
    name: Start
    step_variables:
      input:
        params: []
        records:
        - '{{vars.input.records[0]}}'
    arguments:
      resource: alerts
      resources:
      - alerts
      __triggerLimit: true
      triggerOnSource: true
      fieldbasedtrigger:
        sort: []
        limit: 30
        logic: AND
        filters:
        - type: primitive
          field: source
          value: Fortinet FortiSIEM
          operator: eq
          _operator: eq
      triggerOnReplicate: false
    next: configuration
