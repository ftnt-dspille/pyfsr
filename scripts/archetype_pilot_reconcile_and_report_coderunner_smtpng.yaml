collection: PyFSR Archetype Pilot
description: >
  reconcile-and-report pilot, code-runner + smtp_ng variant. Same asset->issues
  flow as archetype_pilot_reconcile_and_report.yaml, but (a) the diff/CSV step uses
  the custom unrestricted `code-runner` connector (run_python) instead of the stock
  sandboxed `code_snippet`, and (b) the report is emailed via the next-gen
  `smtp_ng`/`send_email_new` connector instead of stock `smtp`/`send_email` (see
  archetype_pilot_reconcile_and_report_coderunner.yaml for the stock-smtp variant).
  The code-runner swap restores the archetype's NATURAL design:

    * a top-level `return <dict>` sets code_output (no print(json.dumps(...)) hack), and
    * open() works, so the snippet writes a real CSV file to disk.

  code-runner returns {code_output: <value>} as its operation result, so the Jinja
  output paths (vars.steps.<name>.data.code_output.*) are identical to the
  code_snippet variant. Deploy code-runner first: scripts/deploy_code_runner.py
  (which also enables the allowCustomConnector gate this uncertified connector needs).

  Asset-centric model: two for_each create_record steps UPSERT every asset (by
  join_key) and every finding as an issue (by issue_key = join_key + mismatch_type),
  so re-runs UPDATE existing records instead of duplicating (idempotent). The
  `asset` lookup relationship is created on recon_issues by the deploy script but is
  left unpopulated in this v1 (link = join_key string); the find_record -> IRI map
  that would populate it is a v2 live-verification follow-up.

  Picklist IRIs are still resolved at DEPLOY time and embedded (create_record needs
  IRIs, not friendly values; the in-playbook compute step has no API to resolve them).
  In a real deploy scripts/deploy_recon_modules.py resolves these from the live
  picklists and substitutes them before compile+push.
visible: true

playbooks:
  - name: PyFSR Pilot Reconcile and Report (code-runner + smtp_ng)
    is_active: true
    parameters: [recipients]
    steps:
      - name: Start
        type: start
        next: Reconcile

      - name: Reconcile
        type: connector
        next: Create attachment
        arguments:
          connector: code-runner
          operation: run_python
          config: Default
          params:
            code: |
              import csv, io, json
              # Canned inventories (swap for real source_a/source_b connector outputs).
              a_raw = [
                  {"serial": "FGT-001", "name": "edge-fw-01", "license": "active"},
                  {"serial": "FGT-002", "name": "edge-fw-02", "license": "expired"},
                  {"serial": "FGT-003", "name": "core-fw-01", "license": "active"},
              ]
              b_raw = [
                  {"serial": "FGT-001", "name": "edge-fw-01", "status": "installed"},
                  {"serial": "FGT-004", "name": "branch-fw-09", "status": "installed"},
              ]

              # Normalize each source to {serial: {join_key, name, <side>_state}}.
              a = {}
              for x in a_raw:
                  s = (x.get("serial") or "").strip()
                  if not s:
                      continue
                  a[s] = {"join_key": s, "name": x.get("name") or s,
                          "source_a": "decommissioned" if x.get("license") == "expired" else "active"}
              b = {}
              for x in b_raw:
                  s = (x.get("serial") or "").strip()
                  if not s:
                      continue
                  b[s] = {"join_key": s, "name": x.get("name") or s, "source_b": "installed"}

              # Assets = union of serials seen in either source (one row each).
              assets = []
              for s in sorted(set(a) | set(b)):
                  assets.append({
                      "join_key": s,
                      "name": (a.get(s, {}).get("name") or b.get(s, {}).get("name") or s),
                      "source_a": a.get(s, {}).get("source_a", "absent"),
                      "source_b": b.get(s, {}).get("source_b", "absent"),
                  })

              # MismatchType picklist IRIs (resolved at DEPLOY time; create_record
              # needs IRIs, not friendly values). RE-RESOLVE after module rebuild.
              MT = {
                  "missing-in-A": "/api/3/picklists/c738aefc-6f1b-4ee6-a656-c6ea571a0bbe",
                  "missing-in-B": "/api/3/picklists/01d63ade-6d34-47d1-a202-0fc1d70d4df0",
                  "license-expiring": "/api/3/picklists/2189c2f4-c83c-4946-ae10-720edd9150a7",
                  "field-mismatch": "/api/3/picklists/d57e47c9-f4b7-4272-a3a7-b8ee8eff7144",
              }
              mt_label = {v: k for k, v in MT.items()}

              # Findings = issues, each keyed by join_key + mismatch_type.
              findings = []
              for s, r in a.items():
                  if s not in b:
                      findings.append({"issue_key": s + "|missing-in-B", "join_key": s,
                                       "mismatch_type": MT["missing-in-B"],
                                       "source_system": "FortiCloud", "target_system": "ServiceNow",
                                       "source_id": s, "target_id": "",
                                       "details": f"{r['name']} missing in ServiceNow"})
                  elif r.get("source_a") == "decommissioned":
                      findings.append({"issue_key": s + "|license-expiring", "join_key": s,
                                       "mismatch_type": MT["license-expiring"],
                                       "source_system": "FortiCloud", "target_system": "ServiceNow",
                                       "source_id": s, "target_id": s,
                                       "details": f"{r['name']} license expired"})
              for s, r in b.items():
                  if s not in a:
                      findings.append({"issue_key": s + "|missing-in-A", "join_key": s,
                                       "mismatch_type": MT["missing-in-A"],
                                       "source_system": "FortiCloud", "target_system": "ServiceNow",
                                       "source_id": "", "target_id": s,
                                       "details": f"{r['name']} missing in FortiCloud"})

              buf = io.StringIO()
              w = csv.writer(buf)
              w.writerow(["join_key", "mismatch_type", "source_system", "target_system", "details"])
              for f in findings:
                  w.writerow([f["join_key"], mt_label.get(f["mismatch_type"], f["mismatch_type"]),
                              f["source_system"], f["target_system"], f["details"]])
              csv_text = buf.getvalue()
              # code-runner allows open(): write the CSV to disk too (natural design).
              csv_path = "/tmp/reconciliation_report.csv"
              with open(csv_path, "w") as fh:
                  fh.write(csv_text)
              # Top-level return works under code-runner -> becomes code_output.
              return {"assets": assets, "findings": findings,
                      "csv_content": csv_text, "csv_path": csv_path,
                      "fc_count": len(a), "sn_count": len(b),
                      "count": len(findings)}

      # code-runner wrote the CSV to disk (open() works); the utilities step turns
      # that on-disk file into a real Attachment record (live-verified: returns an
      # /api/3/attachments/<uuid> @id wrapping the uploaded File). create_cyops_attachment
      # requires a non-blank `name` (upload_file_to_cyops omits it and 400s).
      - name: Create attachment
        type: connector
        next: Upsert assets
        arguments:
          connector: cyops_utilities
          operation: create_cyops_attachment
          params:
            filename: "{{ vars.steps.Reconcile.data.code_output.csv_path }}"
            name: "Reconciliation Report - {{ vars.steps.Reconcile.data.code_output.count }} findings"
            description: "CSV report generated by the reconcile-and-report pilot."

      # --- Upsert every asset (idempotent by join_key) -----------------------
      # is_upsert -> /api/3/upsert/recon_assets + operation: Overwrite; sourceId
      # is the natural key, so a re-run updates the existing asset row, not a dup.
      - name: Upsert assets
        type: create_record
        next: Upsert issues
        for_each:
          item: "{{ vars.steps.Reconcile.data.code_output.assets }}"
        arguments:
          module: recon_assets
          is_upsert: true
          resource:
            sourceId: "{{ vars.item.join_key }}"
            join_key: "{{ vars.item.join_key }}"
            name: "{{ vars.item.name }}"
            source_a: "{{ vars.item.source_a }}"
            source_b: "{{ vars.item.source_b }}"

      # --- Upsert every finding as an issue (idempotent by issue_key) --------
      # The `asset` lookup relationship is left unset in v1 (link = join_key
      # string); populating it needs the find_record -> IRI map (v2 follow-up).
      - name: Upsert issues
        type: create_record
        next: Email report
        for_each:
          item: "{{ vars.steps.Reconcile.data.code_output.findings }}"
        arguments:
          module: recon_issues
          is_upsert: true
          resource:
            sourceId: "{{ vars.item.issue_key }}"
            issue_key: "{{ vars.item.issue_key }}"
            join_key: "{{ vars.item.join_key }}"
            mismatch_type: "{{ vars.item.mismatch_type }}"
            # ReconStatus picklist IRI for "Open" (resolved at deploy time; create_record
            # needs an IRI, not the friendly value "Open"). RE-RESOLVE after module rebuild.
            status: "/api/3/picklists/bfe7109b-82ec-4941-b3e2-499ef610f3f3"
            source_system: "{{ vars.item.source_system }}"
            target_system: "{{ vars.item.target_system }}"
            source_id: "{{ vars.item.source_id }}"
            target_id: "{{ vars.item.target_id }}"
            details: "{{ vars.item.details }}"

      - name: Email report
        type: connector
        arguments:
          connector: smtp_ng
          operation: send_email_new
          config: localhost-postfix
          params:
            type: "Manual Input"
            to: "{{ vars.inputs.recipients }}"
            subject: "Reconciliation Report - {{ vars.steps.Reconcile.data.code_output.count }} findings"
            body_type: "Plain Text"
            content: "Reconciliation report ({{ vars.steps.Reconcile.data.code_output.count }} findings). CSV attached.\n\n{{ vars.steps.Reconcile.data.code_output.csv_content }}"
            # Attach the Attachment record created by the utilities step.
            iri_list: "{{ vars.steps.Create_attachment.data['@id'] }}"
